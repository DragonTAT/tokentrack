name: Build

on:
  push:
    branches: [main, antigravity]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build macOS App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        working-directory: apps/TokscaleMac
        run: swift build

      - name: Build (release)
        working-directory: apps/TokscaleMac
        run: swift build -c release
