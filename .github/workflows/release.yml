name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos-app:
    name: Build & Sign macOS App
    runs-on: macos-latest

    env:
      APP_NAME: TokenTrack
      BUNDLE_ID: com.dragontat.tokentrack

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Resolve release version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── Import Developer ID certificate ──────────────────────────
      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          # Verify secrets are present
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "::error::APPLE_CERTIFICATE_BASE64 secret is empty or not configured"
            exit 1
          fi
          echo "✓ APPLE_CERTIFICATE_BASE64 is set (${#APPLE_CERTIFICATE_BASE64} chars)"

          if [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "::error::APPLE_CERTIFICATE_PASSWORD secret is empty or not configured"
            exit 1
          fi
          echo "✓ APPLE_CERTIFICATE_PASSWORD is set"

          # Create a temporary keychain
          echo "── Creating temporary keychain ──"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "✓ Keychain created and unlocked"

          # Decode the certificate
          echo "── Decoding certificate ──"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          CERT_SIZE=$(wc -c < "$CERT_PATH" | tr -d ' ')
          echo "✓ Certificate decoded ($CERT_SIZE bytes)"

          if [ "$CERT_SIZE" -lt 100 ]; then
            echo "::error::Certificate file is too small ($CERT_SIZE bytes). Is the Base64 encoding correct?"
            exit 1
          fi

          # Import the certificate
          echo "── Importing certificate into keychain ──"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          echo "✓ Certificate imported"

          # Allow codesign to access the keychain without prompting
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "✓ Partition list set"

          # Add the temporary keychain to the search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          echo "✓ Keychain added to search list"

          # Expose for later steps
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

          # Find the signing identity
          echo "── Looking for signing identity ──"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in imported certificate"
            echo "Available identities:"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "✓ Found signing identity: $IDENTITY"

      # ── Build ────────────────────────────────────────────────────
      - name: Build (release)
        working-directory: apps/TokscaleMac
        run: swift build -c release

      # ── Create app bundle ────────────────────────────────────────
      - name: Create app bundle
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          BUNDLE="dist/${APP_NAME}.app"

          mkdir -p dist
          mkdir -p "${BUNDLE}/Contents/MacOS"
          mkdir -p "${BUNDLE}/Contents/Resources"

          cp apps/TokscaleMac/.build/release/TokscaleMac "${BUNDLE}/Contents/MacOS/${APP_NAME}"
          chmod +x "${BUNDLE}/Contents/MacOS/${APP_NAME}"

          cp apps/TokscaleMac/TokscaleMac/Engine/Pricing/builtin.json "${BUNDLE}/Contents/Resources/"
          cp apps/TokscaleMac/TokscaleMac/Resources/AppIcon.icns "${BUNDLE}/Contents/Resources/"

          cat > "${BUNDLE}/Contents/Info.plist" <<'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>TokenTrack</string>
            <key>CFBundleIdentifier</key><string>com.dragontat.tokentrack</string>
            <key>CFBundleExecutable</key><string>TokenTrack</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>LSUIElement</key><true/>
          </dict>
          </plist>
          PLIST_EOF

          # Fix: remove leading whitespace from heredoc (YAML indentation)
          sed -i '' 's/^          //' "${BUNDLE}/Contents/Info.plist"

          # Inject version dynamically (avoids shell expansion issues with heredoc)
          sed -i '' "s|</dict>|  <key>CFBundleVersion</key><string>${VERSION}</string>\n  <key>CFBundleShortVersionString</key><string>${VERSION}</string>\n</dict>|" "${BUNDLE}/Contents/Info.plist"

          echo "── Info.plist ──"
          cat "${BUNDLE}/Contents/Info.plist"

      # ── Code sign with Developer ID ──────────────────────────────
      - name: Sign the app
        run: |
          echo "Signing with: $SIGNING_IDENTITY"

          # Sign the main binary with hardened runtime
          codesign --force --timestamp --options runtime \
            --sign "$SIGNING_IDENTITY" \
            "dist/${APP_NAME}.app/Contents/MacOS/${APP_NAME}"

          # Sign the app bundle
          codesign --force --timestamp --options runtime \
            --sign "$SIGNING_IDENTITY" \
            "dist/${APP_NAME}.app"

          # Verify
          codesign --verify --deep --strict --verbose=2 "dist/${APP_NAME}.app"
          echo "✅ Code signing verified"

      # ── Create DMG ───────────────────────────────────────────────
      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          ARCH=$(uname -m)
          DMG_NAME="${APP_NAME}-v${VERSION}-macos-${ARCH}.dmg"

          # Stage DMG contents with Applications shortcut
          mkdir -p dist/dmg-staging
          cp -R "dist/${APP_NAME}.app" dist/dmg-staging/
          ln -s /Applications dist/dmg-staging/Applications

          hdiutil create \
            -volname "${APP_NAME} v${VERSION}" \
            -srcfolder dist/dmg-staging \
            -ov -format UDZO \
            "dist/${DMG_NAME}"

          # Sign the DMG itself
          codesign --force --timestamp \
            --sign "$SIGNING_IDENTITY" \
            "dist/${DMG_NAME}"

          echo "DMG_PATH=dist/${DMG_NAME}" >> $GITHUB_ENV
          echo "DMG_NAME=${DMG_NAME}" >> $GITHUB_ENV
          ls -lh "dist/${DMG_NAME}"

      # ── Notarize ─────────────────────────────────────────────────
      - name: Notarize DMG
        env:
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_NOTARY_PRIVATE_KEY_BASE64:-}" ]; then
            echo "::error::APPLE_NOTARY_PRIVATE_KEY_BASE64 secret is missing"
            exit 1
          fi
          if [ -z "${APPLE_NOTARY_KEY_ID:-}" ]; then
            echo "::error::APPLE_NOTARY_KEY_ID secret is missing"
            exit 1
          fi
          if [ -z "${APPLE_NOTARY_ISSUER_ID:-}" ]; then
            echo "::error::APPLE_NOTARY_ISSUER_ID secret is missing"
            exit 1
          fi

          # Decode the API key
          KEY_PATH="$RUNNER_TEMP/notary_key.p8"
          echo "$APPLE_NOTARY_PRIVATE_KEY_BASE64" | base64 --decode > "$KEY_PATH"

          if [ ! -s "$KEY_PATH" ]; then
            echo "::error::Decoded notary key is empty"
            exit 1
          fi
          echo "✓ Notary API key prepared"

          if [ ! -f "$DMG_PATH" ]; then
            echo "::error::DMG file not found at $DMG_PATH"
            exit 1
          fi

          echo "Submitting DMG for notarization..."
          xcrun notarytool submit "$DMG_PATH" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait

          echo "Stapling notarization ticket to DMG..."
          xcrun stapler staple "$DMG_PATH"

          echo "✅ Notarization complete"

          # Cleanup
          rm -f "$KEY_PATH"

      # ── Upload artifact ──────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TokenTrack-macos-app
          path: dist/*.dmg
          if-no-files-found: error

      # ── Cleanup keychain ─────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

  create-release:
    name: Create GitHub Release
    needs: [build-macos-app]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.dmg"
          generate_release_notes: true
