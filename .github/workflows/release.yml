name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos-app:
    name: Build macOS App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Resolve release version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build (release)
        working-directory: apps/TokscaleMac
        run: swift build -c release

      - name: Create app bundle
        run: |
          APP_NAME="TokenTrack"
          VERSION="${{ steps.version.outputs.value }}"
          BUILD_DIR="apps/TokscaleMac/.build/release"
          BUNDLE_DIR="dist/${APP_NAME}.app"

          mkdir -p dist
          mkdir -p "${BUNDLE_DIR}/Contents/MacOS"
          mkdir -p "${BUNDLE_DIR}/Contents/Resources"

          cp "${BUILD_DIR}/TokscaleMac" "${BUNDLE_DIR}/Contents/MacOS/${APP_NAME}"

          # Copy resources if they exist
          if [ -d "apps/TokscaleMac/TokscaleMac/Resources" ]; then
            cp -r apps/TokscaleMac/TokscaleMac/Resources/. "${BUNDLE_DIR}/Contents/Resources/"
          fi

          # Copy builtin.json into Resources
          cp apps/TokscaleMac/TokscaleMac/Engine/Pricing/builtin.json "${BUNDLE_DIR}/Contents/Resources/"

          # Write Info.plist
          cat > "${BUNDLE_DIR}/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>${APP_NAME}</string>
            <key>CFBundleIdentifier</key><string>com.dragontat.tokentrack</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>${APP_NAME}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF

          echo "App bundle created at ${BUNDLE_DIR}"

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          DMG_NAME="TokenTrack-v${VERSION}-macos-arm64.dmg"

          hdiutil create \
            -volname "TokenTrack" \
            -srcfolder dist/TokenTrack.app \
            -ov -format UDZO \
            "dist/${DMG_NAME}"

          echo "DMG created: dist/${DMG_NAME}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TokenTrack-macos-app
          path: dist/
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-macos-app]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.dmg
            *.zip
