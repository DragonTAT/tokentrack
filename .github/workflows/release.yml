name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos-app:
    name: Build & Sign macOS App
    runs-on: macos-26

    env:
      APP_NAME: TokenTrack
      BUNDLE_ID: com.dragontat.tokentrack
      REQUIRED_XCODE: "26.3"
      REQUIRED_MACOS_SDK: "26.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        id: select_xcode
        shell: bash
        run: |
          set -euo pipefail

          version_ge() {
            # true if $1 >= $2
            [ "$(printf '%s\n%s\n' "$1" "$2" | sort -V | head -n1)" = "$2" ]
          }

          mapfile -t CANDIDATES < <(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' | sort -V)
          if [ ${#CANDIDATES[@]} -eq 0 ]; then
            echo "::error::No Xcode installation found under /Applications."
            exit 1
          fi

          EXACT_APP=""
          EXACT_SDK_VER=""
          FALLBACK_APP=""
          FALLBACK_XCODE_VER=""
          FALLBACK_SDK_VER=""

          echo "Detected Xcode candidates:"
          for app in "${CANDIDATES[@]}"; do
            dev_dir="$app/Contents/Developer"
            if [ ! -d "$dev_dir" ]; then
              continue
            fi

            xcode_ver="$(DEVELOPER_DIR="$dev_dir" xcodebuild -version 2>/dev/null | awk 'NR==1 {print $2}')"
            sdk_ver="$(DEVELOPER_DIR="$dev_dir" xcrun --sdk macosx --show-sdk-version 2>/dev/null || true)"
            if [ -z "${xcode_ver:-}" ] || [ -z "${sdk_ver:-}" ]; then
              echo "  - $(basename "$app"): skipped (missing version or SDK metadata)"
              continue
            fi

            echo "  - $(basename "$app"): Xcode $xcode_ver, macOS SDK $sdk_ver"

            if [ "$xcode_ver" = "$REQUIRED_XCODE" ]; then
              EXACT_APP="$app"
              EXACT_SDK_VER="$sdk_ver"
              continue
            fi

            if [ -z "$FALLBACK_APP" ] || version_ge "$xcode_ver" "$FALLBACK_XCODE_VER"; then
              FALLBACK_APP="$app"
              FALLBACK_XCODE_VER="$xcode_ver"
              FALLBACK_SDK_VER="$sdk_ver"
            fi
          done

          SELECTED_APP=""
          SELECTED_XCODE_VER=""
          SELECTED_SDK_VER=""

          if [ -n "$EXACT_APP" ]; then
            SELECTED_APP="$EXACT_APP"
            SELECTED_XCODE_VER="$REQUIRED_XCODE"
            SELECTED_SDK_VER="$EXACT_SDK_VER"
          elif [ -n "$FALLBACK_APP" ]; then
            SELECTED_APP="$FALLBACK_APP"
            SELECTED_XCODE_VER="$FALLBACK_XCODE_VER"
            SELECTED_SDK_VER="$FALLBACK_SDK_VER"
            echo "::warning::Preferred Xcode $REQUIRED_XCODE not found. Falling back to Xcode $SELECTED_XCODE_VER with macOS SDK $SELECTED_SDK_VER."
          else
            echo "::error::No usable Xcode installation found on runner."
            exit 1
          fi

          if ! version_ge "$SELECTED_SDK_VER" "$REQUIRED_MACOS_SDK"; then
            echo "::warning::Selected Xcode SDK $SELECTED_SDK_VER is below preferred $REQUIRED_MACOS_SDK. Proceeding in publish-first mode."
          fi

          BEST_DEV_DIR="$SELECTED_APP/Contents/Developer"
          echo "Selected Xcode: $(basename "$SELECTED_APP") (Xcode $SELECTED_XCODE_VER, macOS SDK $SELECTED_SDK_VER)"

          echo "DEVELOPER_DIR=$BEST_DEV_DIR" >> "$GITHUB_ENV"
          echo "xcode_app=$SELECTED_APP" >> "$GITHUB_OUTPUT"
          echo "xcode_version=$SELECTED_XCODE_VER" >> "$GITHUB_OUTPUT"
          echo "sdk_version=$SELECTED_SDK_VER" >> "$GITHUB_OUTPUT"

      - name: Build environment fingerprint
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          {
            echo "DEVELOPER_DIR=${DEVELOPER_DIR:-unset}"
            xcodebuild -version
            swift --version
            echo "macOS SDK: $(xcrun --sdk macosx --show-sdk-version)"
            echo "Host architecture: $(uname -m)"
            echo "UTC build time: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } | tee dist/build_fingerprint.txt

      - name: Resolve release version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── Import Developer ID certificate ──────────────────────────
      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          # Verify secrets are present
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "::error::APPLE_CERTIFICATE_BASE64 secret is empty or not configured"
            exit 1
          fi
          echo "✓ APPLE_CERTIFICATE_BASE64 is set (${#APPLE_CERTIFICATE_BASE64} chars)"

          if [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "::error::APPLE_CERTIFICATE_PASSWORD secret is empty or not configured"
            exit 1
          fi
          echo "✓ APPLE_CERTIFICATE_PASSWORD is set"

          # Create a temporary keychain
          echo "── Creating temporary keychain ──"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "✓ Keychain created and unlocked"

          # Decode the certificate
          echo "── Decoding certificate ──"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          CERT_SIZE=$(wc -c < "$CERT_PATH" | tr -d ' ')
          echo "✓ Certificate decoded ($CERT_SIZE bytes)"

          if [ "$CERT_SIZE" -lt 100 ]; then
            echo "::error::Certificate file is too small ($CERT_SIZE bytes). Is the Base64 encoding correct?"
            exit 1
          fi

          # Import the certificate
          echo "── Importing certificate into keychain ──"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          echo "✓ Certificate imported"

          # Allow codesign to access the keychain without prompting
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "✓ Partition list set"

          # Add the temporary keychain to the search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          echo "✓ Keychain added to search list"

          # Expose for later steps
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

          # Find the signing identity
          echo "── Looking for signing identity ──"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in imported certificate"
            echo "Available identities:"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "✓ Found signing identity: $IDENTITY"

      # ── Build ────────────────────────────────────────────────────
      - name: Build (release)
        working-directory: apps/TokscaleMac
        run: swift build -c release

      - name: Validate release binary (arm64 + SDK gate)
        shell: bash
        run: |
          set -euo pipefail

          version_ge() {
            [ "$(printf '%s\n%s\n' "$1" "$2" | sort -V | head -n1)" = "$2" ]
          }

          BIN="apps/TokscaleMac/.build/release/TokscaleMac"
          if [ ! -f "$BIN" ]; then
            echo "::error::Release binary not found at $BIN"
            exit 1
          fi

          arch_line="$(lipo -info "$BIN")"
          echo "$arch_line"

          arch=""
          if [[ "$arch_line" == *"is architecture:"* ]]; then
            arch="$(echo "$arch_line" | sed -E 's/.*is architecture: ([^ ]+).*/\1/')"
          elif [[ "$arch_line" == *"are:"* ]]; then
            arch="$(echo "$arch_line" | sed -E 's/.*are: (.*)/\1/' | awk '{print $1}')"
          fi

          if [ "$arch" != "arm64" ]; then
            echo "::error::Expected arm64 build, got '$arch'."
            exit 1
          fi

          sdk_ver="$(otool -l "$BIN" | awk '/LC_BUILD_VERSION/{f=1; next} f && $1=="sdk" {print $2; exit}')"
          if [ -z "${sdk_ver:-}" ]; then
            echo "::error::Failed to extract SDK version from $BIN"
            exit 1
          fi

          echo "Binary SDK: $sdk_ver"
          if ! version_ge "$sdk_ver" "$REQUIRED_MACOS_SDK"; then
            echo "::warning::Binary SDK $sdk_ver is below preferred $REQUIRED_MACOS_SDK. Publishing will continue, but macOS 26 glass effects may degrade."
          fi

      # ── Create app bundle ────────────────────────────────────────
      - name: Create app bundle
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          BUNDLE="dist/${APP_NAME}.app"

          mkdir -p dist
          mkdir -p "${BUNDLE}/Contents/MacOS"
          mkdir -p "${BUNDLE}/Contents/Resources"

          # Copy main binary
          cp apps/TokscaleMac/.build/release/TokscaleMac "${BUNDLE}/Contents/MacOS/${APP_NAME}"
          chmod +x "${BUNDLE}/Contents/MacOS/${APP_NAME}"

          # Fix: Copy SPM resource bundles to prevent crash on launch
          # Swift Packages output a .bundle for their resources alongside the binary.
          if ls apps/TokscaleMac/.build/release/*.bundle 1> /dev/null 2>&1; then
            cp -R apps/TokscaleMac/.build/release/*.bundle "${BUNDLE}/Contents/Resources/"
          fi

          # Copy local resources
          cp apps/TokscaleMac/TokscaleMac/Engine/Pricing/builtin.json "${BUNDLE}/Contents/Resources/"
          cp apps/TokscaleMac/TokscaleMac/Resources/AppIcon.icns "${BUNDLE}/Contents/Resources/"

          echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?>
          <!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">
          <plist version=\"1.0\">
          <dict>
            <key>CFBundleName</key><string>TokenTrack</string>
            <key>CFBundleIdentifier</key><string>com.dragontat.tokentrack</string>
            <key>CFBundleExecutable</key><string>TokenTrack</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>LSUIElement</key><true/>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
          </dict>
          </plist>" > "${BUNDLE}/Contents/Info.plist"

          echo "── Info.plist ──"
          cat "${BUNDLE}/Contents/Info.plist"

      - name: Validate packaged app binary (arm64 + SDK gate)
        shell: bash
        run: |
          set -euo pipefail

          version_ge() {
            [ "$(printf '%s\n%s\n' "$1" "$2" | sort -V | head -n1)" = "$2" ]
          }

          BIN="dist/${APP_NAME}.app/Contents/MacOS/${APP_NAME}"
          if [ ! -f "$BIN" ]; then
            echo "::error::Packaged app binary not found at $BIN"
            exit 1
          fi

          arch_line="$(lipo -info "$BIN")"
          echo "$arch_line"

          arch=""
          if [[ "$arch_line" == *"is architecture:"* ]]; then
            arch="$(echo "$arch_line" | sed -E 's/.*is architecture: ([^ ]+).*/\1/')"
          elif [[ "$arch_line" == *"are:"* ]]; then
            arch="$(echo "$arch_line" | sed -E 's/.*are: (.*)/\1/' | awk '{print $1}')"
          fi

          if [ "$arch" != "arm64" ]; then
            echo "::error::Expected packaged app to be arm64, got '$arch'."
            exit 1
          fi

          sdk_ver="$(otool -l "$BIN" | awk '/LC_BUILD_VERSION/{f=1; next} f && $1=="sdk" {print $2; exit}')"
          if [ -z "${sdk_ver:-}" ]; then
            echo "::error::Failed to extract SDK version from packaged app binary."
            exit 1
          fi

          echo "Packaged app SDK: $sdk_ver"
          if ! version_ge "$sdk_ver" "$REQUIRED_MACOS_SDK"; then
            echo "::warning::Packaged app SDK $sdk_ver is below preferred $REQUIRED_MACOS_SDK. Publishing will continue, but macOS 26 glass effects may degrade."
          fi

          echo "RELEASE_ARCH=$arch" >> "$GITHUB_ENV"

      # ── Code sign with Developer ID ──────────────────────────────
      - name: Sign the app
        run: |
          echo "Signing with: $SIGNING_IDENTITY"

          # Sign the main binary with hardened runtime
          codesign --force --timestamp --options runtime \
            --sign "$SIGNING_IDENTITY" \
            "dist/${APP_NAME}.app/Contents/MacOS/${APP_NAME}"

          # Sign dynamic libraries and frameworks from inside out
          if [ -d "dist/${APP_NAME}.app/Contents" ]; then
             # Sign inner dylibs
             find "dist/${APP_NAME}.app/Contents" -type f -name "*.dylib" -exec codesign --force --timestamp --options runtime --sign "$SIGNING_IDENTITY" {} \;
             # Sign inner frameworks (if any exist)
             find "dist/${APP_NAME}.app/Contents" -type d -name "*.framework" -exec codesign --force --timestamp --options runtime --sign "$SIGNING_IDENTITY" {} \;
             # Note: We do NOT explicitly sign .bundle here because SPM resource bundles 
             # usually don't contain executable binaries and will cause "unrecognized format" errors.
             # They will be sealed automatically when we sign the outer .app.
          fi

          # Sign the app bundle
          codesign --force --timestamp --options runtime \
            --sign "$SIGNING_IDENTITY" \
            "dist/${APP_NAME}.app"

          echo "── Verification ──"
          codesign --verify --deep --strict --verbose=2 "dist/${APP_NAME}.app"
          echo "✅ Code signing verified"

      # ── Create DMG ───────────────────────────────────────────────
      - name: Create DMG
        run: |
          ARCH="${RELEASE_ARCH:-arm64}"
          DMG_NAME="${APP_NAME}-v${{ steps.version.outputs.value }}-macos-${ARCH}.dmg"
          
          echo "Installing create-dmg..."
          brew install create-dmg

          echo "Packaging application into $DMG_NAME..."
          create-dmg \
            --volname "${APP_NAME}" \
            --background "apps/TokscaleMac/TokscaleMac/Resources/DMG/background.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "${APP_NAME}.app" 150 200 \
            --hide-extension "${APP_NAME}.app" \
            --app-drop-link 450 200 \
            "dist/${DMG_NAME}" \
            "dist/${APP_NAME}.app"

          # Sign the DMG itself
          codesign --force --timestamp \
            --sign "$SIGNING_IDENTITY" \
            "dist/${DMG_NAME}"

          echo "DMG_PATH=dist/${DMG_NAME}" >> $GITHUB_ENV
          echo "DMG_NAME=${DMG_NAME}" >> $GITHUB_ENV
          ls -lh "dist/${DMG_NAME}"

      # ── Notarize ─────────────────────────────────────────────────
      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_ID:-}" ]; then
            echo "::error::APPLE_ID secret is missing"
            exit 1
          fi
          if [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]; then
            echo "::error::APPLE_APP_SPECIFIC_PASSWORD secret is missing"
            exit 1
          fi
          if [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "::error::APPLE_TEAM_ID secret is missing"
            exit 1
          fi

          if [ ! -f "$DMG_PATH" ]; then
            echo "::error::DMG file not found at $DMG_PATH"
            exit 1
          fi

          echo "Submitting DMG for notarization..."
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          echo "Stapling notarization ticket to DMG..."
          xcrun stapler staple "$DMG_PATH"

          echo "✅ Notarization complete"

      # ── Upload artifact ──────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TokenTrack-macos-app
          path: |
            dist/*.dmg
            dist/build_fingerprint.txt
          if-no-files-found: error

      # ── Cleanup keychain ─────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

  create-release:
    name: Create GitHub Release
    needs: [build-macos-app]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.dmg"
          generate_release_notes: true
