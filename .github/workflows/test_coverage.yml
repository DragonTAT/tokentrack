name: Test

on:
  push:
    branches: [main, antigravity]
    paths:
      - 'apps/TokscaleMac/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/TokscaleMac/**'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        working-directory: apps/TokscaleMac
        run: swift build

      - name: Run tests (if any)
        working-directory: apps/TokscaleMac
        run: swift test 2>&1 || echo "No tests configured yet"
